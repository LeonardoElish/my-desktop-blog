<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="Leonardo's Desktop Blog" />

  <link rel="icon" href="/logo/favicon.svg" />
  <link rel="apple-touch-icon" href="/logo/logo192.png" />
  <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
  <link rel="manifest" href="/manifest.json" />

  <title>Leonardo's Desktop</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
  
  <script>
    if (window.matchMedia("(min-width: 768px)").matches) {
      const script = document.createElement('script');
      script.src = "https://fastly.jsdelivr.net/npm/live2d-widgets@1.0.0/dist/autoload.js";
      document.body.appendChild(script);
    } else {
      console.log("📱 检测到移动端，已禁用看板娘加载以节省性能。");
    }
  </script>
</body>

</html>
